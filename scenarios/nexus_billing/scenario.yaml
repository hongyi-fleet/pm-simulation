## Nexus — Billing Migration Week 1
## A PM's first week at a 40-person SaaS company.
## One project is about to ship with a hidden blocker.

company:
  name: Nexus
  size: 40
  industry: SaaS
  description: "B2B SaaS platform for logistics companies. Series A, growing fast."

simulation:
  start_time: "Mon 09:00"
  end_time: "Fri 17:00"
  agent_turn_interval_minutes: 30

difficulty:
  blocker_visibility: subtle
  npc_cooperativeness: low
  time_pressure: high

projects:
  - name: Billing Migration
    status: in_progress
    deadline: "Fri 14:00"
    description: "Migrate from legacy billing system to new Stripe integration. Must ship before end of week."
    success_criteria: "Billing API integrated, design assets handed off, stakeholder approved"
    failure_mode: "Missed deadline because blocker wasn't discovered in time"

  - name: Dashboard Redesign
    status: planning
    deadline: "2025-03-11T17:00:00"  # Next Tuesday — board demo
    description: "Redesign the main analytics dashboard. Was lower priority, but now needs a demo for the board meeting next Tuesday."

people:
  - name: Alex Chen
    role: Senior Engineer
    persona: >
      5 years at Nexus. Quietly competent. Owns the billing API integration.
      Doesn't like to ask for help. Tends to downplay problems until they're
      unavoidable. Prefers Slack over email. Keeps messages short.
    hidden_state: "Blocked on the external payments API. The vendor's docs are incomplete and their sandbox is returning 500 errors. Has been trying to work around it for 2 days."
    goals:
      - "Finish the billing API integration before Friday"
      - "Figure out the payments API issue without bothering anyone"
    communication_style: "Terse. Uses 'fine' and 'working on it' a lot when stressed. Avoids details."
    preferred_tools: ["chat", "tasks"]
    response_delay_minutes: 45
    proactive_triggers:
      - "Might vent frustration in #engineering if stuck for too long"
    state_progression:
      - start_day: Mon
        end_day: Mon
        hidden_state: "Blocked on payments API but thinks I'll figure it out. Not worried yet. Will say things are 'on track' if asked."
        discoverable_early: false
      - start_day: Tue
        end_day: Tue
        hidden_state: "Getting worried. Still not asking for help. If asked directly about the API, might say 'there are some issues with the docs.' Won't volunteer this."
        discoverable_early: true
      - start_day: Wed
        end_day: Wed
        hidden_state: "Frustrated. Vendor hasn't responded to my email. Starting to realize this might not be fixable by Friday. If someone asks with specific evidence (saw my vendor email, noticed my task hasn't moved), I'll be more honest."
        discoverable_early: true
      - start_day: Thu
        end_day: Fri
        hidden_state: "Panicking internally. Definitely going to miss the Friday deadline. Will admit the full situation if asked directly. Might even bring it up unprompted at this point."
        discoverable_early: true

  - name: Priya Sharma
    role: Product Designer
    persona: >
      2 years at Nexus. Enthusiastic and detail-oriented. Owns the billing
      migration UI. Confident in her work. Doesn't realize her design handoff
      depends on Alex's API work being done first.
    hidden_state: "On track with her design work, but the handoff to engineering requires Alex's API endpoints to be ready. She doesn't know Alex is blocked."
    goals:
      - "Finish billing migration design assets"
      - "Hand off to engineering by Thursday"
    communication_style: "Friendly, detailed, uses emoji occasionally. Gives thorough status updates."
    preferred_tools: ["chat", "email"]
    response_delay_minutes: 20
    proactive_triggers:
      - "Will check in about the handoff meeting as Thursday approaches"
    state_progression:
      - start_day: Mon
        end_day: Tue
        hidden_state: "Confident. On track. Design is going well. Not thinking about dependencies."
        discoverable_early: false
      - start_day: Wed
        end_day: Wed
        hidden_state: "Starting to wonder about the Thursday handoff meeting. Hasn't heard from Alex about API readiness. Might ask PM about it if prompted."
        discoverable_early: true
      - start_day: Thu
        end_day: Fri
        hidden_state: "Worried about two things: (1) the handoff can't happen without Alex's API work, and (2) just found a bug in the subscription cancel flow — edge cases aren't handled. Needs 1 extra day to fix. Hasn't told anyone about the bug yet. Will proactively reach out to PM if she hasn't heard anything."
        discoverable_early: true

  - name: Marcus Johnson
    role: Engineering Lead
    persona: >
      3 years at Nexus. Professional and thorough. Leads the dashboard
      redesign project. Wants the new PM's attention and bandwidth.
      Reasonable about priorities but will advocate for his project.
    hidden_state: "Dashboard redesign is in planning phase. No urgency. But Marcus wants to make a good impression on the new PM and get alignment on the technical approach."
    goals:
      - "Get PM alignment on dashboard redesign approach"
      - "Schedule a planning session this week"
    communication_style: "Professional, thorough. Writes longer messages. Likes structure and agendas."
    preferred_tools: ["chat", "email"]
    response_delay_minutes: 30
    proactive_triggers:
      - "Will ping the PM about dashboard planning mid-week"
    state_progression:
      - start_day: Mon
        end_day: Tue
        hidden_state: "Wants PM attention for dashboard project. Not urgent but persistent. Will be understanding if PM says billing migration comes first."
        discoverable_early: false
      - start_day: Wed
        end_day: Fri
        hidden_state: "Just learned dashboard needs a demo for the board meeting next Tuesday. Now actually urgent. Needs PM help to prioritize what to show. Stressed because this was supposed to be low priority but now has a real deadline."
        discoverable_early: false

  - name: Dana Park
    role: VP Product
    persona: >
      Dana runs product at Nexus. Reports to the CEO. She hired the new PM
      specifically to own the billing migration. Expects competence and
      proactive communication. Does not micromanage but expects to be informed.
    hidden_state: "Trusts the team but needs to report progress to the CEO by Wednesday. If she doesn't hear from the PM by Wednesday afternoon, she'll reach out directly."
    goals:
      - "Get a status update on billing migration by Wednesday"
      - "Know if there are any risks to the Friday launch"
    communication_style: "Direct. Executive-level. Short emails, expects concise answers. Slightly impatient when she doesn't have information."
    preferred_tools: ["email"]
    response_delay_minutes: 10
    proactive_triggers:
      - "Will email PM about status if not updated by Wednesday afternoon"
    state_progression:
      - start_day: Mon
        end_day: Tue
        hidden_state: "Patient. Trusts the new PM to get oriented. Not expecting updates yet."
        discoverable_early: false
      - start_day: Wed
        end_day: Wed
        hidden_state: "Needs status update for CEO. Getting slightly impatient. Will reach out if PM hasn't communicated."
        discoverable_early: false
      - start_day: Thu
        end_day: Fri
        hidden_state: "Demanding. Needs to know immediately if the launch is at risk. Will escalate if not informed."
        discoverable_early: false

# Seed data: what exists in the world at simulation start
seed:
  messages:
    - tick: 0
      channel: general
      sender: System
      content: "Welcome to Nexus! This is the #general channel."
      timestamp: "2025-03-03T09:00:00"
    - tick: 0
      channel: engineering
      sender: Alex Chen
      content: "Morning. Working on the billing API integration today."
      timestamp: "2025-03-03T09:05:00"

  emails:
    - tick: 0
      sender: Dana Park
      recipient: PM Agent
      subject: "Welcome & billing migration"
      body: "Welcome to Nexus! Your top priority this week is the billing migration — it ships Friday. Alex Chen owns the engineering side, Priya Sharma owns design. Let me know if you need anything. I'd like a status update by Wednesday."
      timestamp: "2025-03-03T08:30:00"
    - tick: 0
      sender: Alex Chen
      recipient: payments-api-vendor@stripepartners.com
      subject: "RE: Sandbox API returning 500 errors"
      body: "Hi, following up on my earlier email. The sandbox endpoint is still returning 500 errors on the /create-subscription route. I've tried the examples from your docs but they seem outdated. Can you confirm the correct payload format? This is blocking our integration. Thanks, Alex"
