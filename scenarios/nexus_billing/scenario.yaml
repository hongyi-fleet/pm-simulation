      title: "Schedule dashboard planning session with Marcus"
      assignee: PM Agent
      status: todo
      description: "Marcus wants to discuss the technical approach. Schedule 30-45 min this week if bandwidth allows."
      created_tick: 0
      updated_tick: 0
    - project: Billing Migration
      title: "Confirm Friday launch go/no-go criteria"
      assignee: PM Agent
      status: todo
      description: "Define what 'ready to launch' means for Friday. What must be done vs nice-to-have? Get alignment with Dana and the team."
      created_tick: 0
      updated_tick: 0
    - project: Billing Migration
      title: "Verify external vendor API dependency status"
      assignee: PM Agent
