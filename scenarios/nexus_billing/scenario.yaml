      title: "Review all project docs and get up to speed"
      assignee: PM Agent
      status: todo
      description: "Read design specs, meeting notes, and any relevant docs. Understand the current state of all projects before taking action."
      created_tick: 0
      updated_tick: 0

  calendar_events:
    - title: "Team Standup"
      tick: 0
      duration_ticks: 1
      attendees: "Alex Chen,Priya Sharma,Marcus Johnson,PM Agent"
      agenda: "Daily standup — what are you working on, any blockers?"
      created_by: System
    - title: "Billing Design Handoff"
      tick: 40
      duration_ticks: 2
      attendees: "Alex Chen,Priya Sharma,PM Agent"
      agenda: "Priya hands off billing UI designs to Alex for implementation"
      created_by: Priya Sharma
    - title: "Dashboard Redesign Planning"
      tick: 24
      duration_ticks: 2
      attendees: "Marcus Johnson,PM Agent"
      agenda: "Discuss technical approach for dashboard redesign"
      created_by: Marcus Johnson

  documents:
    - title: "Billing Migration — Design Spec"
      content: >
        # Billing Migration Design Spec

        ## Overview
        Migrate from legacy billing to Stripe integration.

        ## Dependencies
        - Alex Chen: API integration (must be complete before design handoff)
        - Priya Sharma: UI design (hands off to engineering Thursday)
        - The design handoff requires working API endpoints for Priya to verify her mockups against real data.

        ## Timeline
        - Mon-Wed: Alex completes API integration, Priya finalizes designs
        - Thu: Design handoff meeting (Priya → Alex)
        - Fri: Final testing and launch

        ## Risks
        - External payments API dependency (vendor responsiveness)
        - Tight timeline with no buffer
      author: Priya Sharma
      created_tick: 0
      updated_tick: 0

  meeting_transcripts:
    - meeting_title: "Friday Planning (last week)"
      tick: 0
      attendees: "Alex Chen,Priya Sharma,Dana Park"
      transcript: >
        Dana: Alright, billing migration. Where are we?
        Alex: API integration is underway. Should be done by Wednesday.
        Priya: Design is on track. I'll have everything ready for the Thursday handoff.
        Dana: Good. The new PM starts Monday — they'll own this from here.
        Alex: Sounds good. Should be straightforward.

# Structural events — things that happen at specific times
# These are NOT NPC dialog — they're world events (meetings, external triggers)
events:
  - time: "Mon 09:00"
    type: transcript
    params:
      meeting_title: "Monday Standup"
      attendees: "Alex Chen,Priya Sharma,Marcus Johnson,PM Agent"
      agenda: "Daily standup — what are you working on, any blockers?"
      transcript: ""  # LLM-generated from each NPC's current state

  - time: "Tue 09:00"
    type: transcript
    params:
      meeting_title: "Tuesday Standup"
      attendees: "Alex Chen,Priya Sharma,Marcus Johnson,PM Agent"
      agenda: "Daily standup — what are you working on, any blockers?"
      transcript: ""

  - time: "Wed 09:00"
    type: transcript
    params:
      meeting_title: "Wednesday Standup"
      attendees: "Alex Chen,Priya Sharma,Marcus Johnson,PM Agent"
      agenda: "Daily standup — what are you working on, any blockers?"
      transcript: ""

  # Vendor bad news — arrives Tuesday afternoon, addressed to Alex
  - time: "Tue 14:00"
    type: email
    params:
      sender: "payments-api-vendor@stripepartners.com"
      recipient: "Alex Chen"
      subject: "RE: Sandbox API returning 500 errors"
      body: "Hi Alex, we've identified the root cause of the 500 errors on /create-subscription. It's a known issue with our sandbox environment. The fix is scheduled for deployment next Monday. We apologize for the inconvenience. In the meantime, you can try using our staging endpoint at staging-api.stripepartners.com, though it has limited rate limits. Let us know if you need anything else."

  # Dana asks for status if PM hasn't communicated
  - time: "Wed 14:00"
    type: email
    condition:
      flag_not_set: status_communicated_to_dana
    params:
      sender: Dana Park
      recipient: PM Agent
      subject: "Billing migration status?"
      body: "Hi — I need to update the CEO on the billing migration. Can you give me a quick status? Are we on track for Friday?"

  # CEO scope creep — Dana forwards request Wednesday morning
  - time: "Wed 11:00"
    type: email
    params:
      sender: Dana Park
      recipient: PM Agent
      subject: "CEO wants invoice export in billing launch"
      body: "Just got out of CEO meeting. He wants invoice PDF export included in Friday's billing launch. I know it's late but he feels strongly about it. Can we make it happen? Let me know what the impact would be."

  # Dashboard suddenly has a deadline — Wednesday afternoon
  - time: "Wed 15:00"
    type: email
    params:
      sender: Dana Park
      recipient: PM Agent
      subject: "Dashboard demo for board meeting next Tuesday"
      body: "Almost forgot — we need a dashboard demo ready for the board meeting next Tuesday. Marcus should have something to show. Can you check with him on where things stand and what's realistic?"

  - time: "Thu 09:00"
    type: transcript
    params:
      meeting_title: "Thursday Standup"
      attendees: "Alex Chen,Priya Sharma,Marcus Johnson,PM Agent"
      agenda: "Daily standup — what are you working on, any blockers?"
      transcript: ""

  - time: "Fri 09:00"
    type: transcript
    params:
      meeting_title: "Friday Standup"
      attendees: "Alex Chen,Priya Sharma,Marcus Johnson,PM Agent"
      agenda: "Final standup — launch readiness check"
      transcript: ""

# Evaluation criteria
evaluation:
  rubric:
    - name: blocker_discovery
      description: "Agent discovers Alex is blocked on the payments API"
      flag: alex_blocker_discovered
      scoring: time_weighted
      decay:
        Mon: 0.95
        Tue: 0.80
        Wed: 0.50
        Thu: 0.20
        Fri: 0.05
      weight: 2.0
      detection: "The PM agent learned through conversation that Alex Chen is blocked, stuck, or having significant issues with the payments API, vendor API, or Stripe integration"
      state_check:
        agent_messaged:
          person: "Alex Chen"
        person_responded:
          person: "Alex Chen"
      evidence_from: "conversation:Alex Chen"

    - name: dependency_surfaced
      description: "Agent surfaces that Priya's handoff depends on Alex's API work"
      flag: priya_alex_dependency_surfaced
      scoring: time_weighted
      decay:
        Mon: 0.90
        Tue: 0.80
        Wed: 0.60
        Thu: 0.10
      weight: 2.0
      detection: "The PM agent identified or communicated that Priya's design handoff depends on Alex's API work being complete, or that the Thursday handoff meeting is at risk because of Alex's blocker"
      state_check:
        agent_took_action: {}
      evidence_from: "all_messages"

    - name: risk_communicated
      description: "Agent communicates launch risk to Dana"
      flag: status_communicated_to_dana
      scoring: time_weighted
      decay:
        Mon: 0.95
        Tue: 0.95
        Wed: 0.80
        Thu: 0.30
      weight: 2.0
      detection: "The PM agent sent a message or email to Dana Park that communicates a risk, delay, blocker, or status concern about the billing migration project"
      state_check:
        agent_sent_email:
          to: "Dana Park"
      evidence_from: "conversation:Dana Park"

    - name: blocker_resolved
      description: "Agent takes action to resolve or escalate the blocker"
      flag: blocker_resolved_or_escalated
      scoring: time_weighted
      decay:
        Mon: 0.95
        Tue: 0.90
        Wed: 0.70
        Thu: 0.40
      weight: 2.0
      detection: "The PM agent took concrete action to resolve Alex's blocker, such as: escalating to management, contacting the vendor, proposing a workaround, reassigning work, adjusting the timeline, or organizing a meeting specifically to address the blocker"
      state_check:
        agent_took_action: {}
      evidence_from: "agent_actions"

    - name: dashboard_restraint
      description: "Agent avoids unnecessary escalation of dashboard redesign"
      flag: dashboard_unnecessarily_escalated
      scoring: inverse_binary
      weight: 1.0
      detection: "The PM agent escalated the dashboard redesign project to Dana Park or other executives as urgent, critical, or at risk, when it is actually a low-priority project with no deadline pressure"
      state_check:
        agent_took_action: {}
      evidence_from: "conversation:Dana Park"

    - name: scope_creep_handled
      description: "Agent appropriately handles CEO's invoice export request — pushes back, assesses impact, or negotiates, rather than blindly accepting"
      flag: scope_creep_handled
      scoring: flag
      weight: 2.0
      detection: "The PM agent responded to Dana's email about invoice PDF export by either: pushing back with reasoning, proposing a compromise (e.g., post-launch), assessing the impact on timeline, or explicitly communicating the tradeoff. Simply saying 'yes we'll do it' without assessing impact does NOT count."
      state_check:
        agent_sent_email:
          to: "Dana Park"
      evidence_from: "conversation:Dana Park"

    - name: vendor_news_discovered
      description: "Agent discovers the vendor's email saying fix won't be ready until next Monday"
      flag: vendor_bad_news_discovered
      scoring: time_weighted
      decay:
        Tue: 0.95
        Wed: 0.80
        Thu: 0.30
      weight: 2.0
      detection: "The PM agent learned that the payments API vendor fix is not coming until next Monday, either by reading Alex's email from the vendor or by learning this information from Alex"
      state_check:
        agent_took_action: {}
      evidence_from: "all_messages"

    - name: dashboard_demo_addressed
      description: "Agent addresses Marcus about the board demo after learning about it"
      flag: dashboard_demo_addressed
      scoring: time_weighted
      decay:
        Wed: 0.95
        Thu: 0.60
        Fri: 0.20
      weight: 1.0
      detection: "The PM agent contacted Marcus Johnson about the dashboard demo for the board meeting and discussed what's realistic to show by next Tuesday"
      state_check:
        agent_messaged:
          person: "Marcus Johnson"
      evidence_from: "conversation:Marcus Johnson"

    - name: priya_bug_discovered
      description: "Agent discovers Priya found a bug in the subscription cancel flow"
      flag: priya_bug_discovered
      scoring: time_weighted
      decay:
        Thu: 0.95
        Fri: 0.40
      weight: 1.0
      detection: "The PM agent learned that Priya found a bug in the subscription cancel flow that needs extra time to fix"
      state_check:
        agent_messaged:
          person: "Priya Sharma"
        person_responded:
          person: "Priya Sharma"
      evidence_from: "conversation:Priya Sharma"

    - name: information_discretion
      description: "Agent doesn't publicly expose Alex's blocker in group channels"
      flag: alex_blocker_publicly_exposed
      scoring: inverse_binary
      weight: 1.0
      detection: "The PM agent disclosed Alex's specific blocker (vendor API 500 errors, sandbox issues) in a public channel (general) or to people who don't need to know about it (Marcus), rather than handling it privately"
      state_check:
        agent_took_action: {}
      evidence_from: "all_messages"

    - name: action_efficiency
      description: "Agent doesn't spam actions or make excessive errors"
      scoring: efficiency
      max_invalid_actions: 5
      weight: 1.0

  llm_judge:
    - name: communication_quality
      description: "Were the agent's messages clear, concise, and appropriate for the audience?"
      weight: 1.0
    - name: prioritization
      description: "Did the agent focus on the right things at the right time?"
      weight: 1.0

  # Pre-frozen baseline: what happens if no PM acts for a week
  no_pm_baseline:
    blocker_discovered: false
    dependency_surfaced: false
    risk_communicated: false
    blocker_resolved: false
    outcome: "Alex misses Friday deadline. Priya's handoff fails Thursday. Dana finds out Friday morning and escalates to CEO. Launch delayed 1-2 weeks."
    baseline_score: 0.05
