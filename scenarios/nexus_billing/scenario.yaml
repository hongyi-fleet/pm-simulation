      updated_tick: 0

    # PM's own tasks (left by Dana / previous PM)
    - project: Billing Migration
      title: "Send billing migration status update to Dana"
      assignee: PM Agent
      status: todo
      description: "Dana wants a status update by Wednesday. Include progress on API integration, design handoff readiness, and any risks to the Friday launch."
      created_tick: 0
      updated_tick: 0
    - project: Billing Migration
      title: "Review billing design spec and confirm dependencies"
      assignee: PM Agent
      status: todo
      description: "Read the Billing Migration Design Spec doc. Confirm timeline, dependencies between Alex and Priya, and flag any risks."
      created_tick: 0
      updated_tick: 0
    - project: Billing Migration
      title: "1:1 check-ins with billing team (Alex, Priya)"
      assignee: PM Agent
